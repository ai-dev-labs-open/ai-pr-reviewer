name: Release

# Triggered manually or when a version tag is pushed.
# The workflow verifies the full build, then commits dist/ and creates a GitHub Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0). Leave empty to skip tagging."
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can push a commit back to the tag.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm build

      - name: Build action bundle
        run: pnpm build:action

      - name: Commit dist to tag
        # Only runs when triggered by a version tag push.
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force dist/
          # Only commit if there are staged changes.
          git diff --cached --quiet || git commit -m "chore: update dist for ${{ github.ref_name }}"
          git tag -f "${{ github.ref_name }}"
          git push origin "${{ github.ref_name }}" --force

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag
